<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Funky Ownership Card</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --red: #8b1538;
        --navy: #1a2238;
        --cream: #f4efe8;
        --electric: #00fff5;
        --pink: #ff006e;
        --yellow: #ffbe0b;
      }
      body {
        font-family: "Space Mono", monospace;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--cream);
        position: relative;
        overflow: hidden;
      }
      body::after {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 255, 245, 0.03) 2px,
          rgba(0, 255, 245, 0.03) 4px
        );
        pointer-events: none;
        animation: scanlines 8s linear infinite;
      }
      @keyframes scanlines {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(10px);
        }
      }

      .container {
        position: relative;
        z-index: 10;
      }

      .card {
        width: 500px;
        background: white;
        border-radius: 0;
        position: relative;
        overflow: visible;
        box-shadow:
          20px 20px 0 var(--navy),
          20px 20px 0 2px var(--pink);
        animation: cardGlitch 0.8s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes cardGlitch {
        0%,
        100% {
          transform: translate(0, 0);
        }
        10% {
          transform: translate(-5px, 5px);
        }
        20% {
          transform: translate(5px, -5px);
        }
        30% {
          transform: translate(-5px, -5px);
        }
        40% {
          transform: translate(5px, 5px);
        }
        50% {
          transform: translate(0, 0);
        }
      }
      .card:hover {
        box-shadow:
          25px 25px 0 var(--navy),
          25px 25px 0 2px var(--pink);
        transform: translate(-5px, -5px);
      }
      .card::before {
        content: "";
        position: absolute;
        inset: -10px;
        background:
          linear-gradient(45deg, var(--electric) 25%, transparent 25%),
          linear-gradient(-45deg, var(--electric) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, var(--electric) 75%),
          linear-gradient(-45deg, transparent 75%, var(--electric) 75%);
        background-size: 20px 20px;
        background-position:
          0 0,
          0 10px,
          10px -10px,
          -10px 0px;
        opacity: 0.3;
        animation: zigzagMove 20s linear infinite;
      }
      @keyframes zigzagMove {
        0% {
          background-position:
            0 0,
            0 10px,
            10px -10px,
            -10px 0px;
        }
        100% {
          background-position:
            20px 20px,
            20px 30px,
            30px 10px,
            10px 20px;
        }
      }
      .strip {
        position: absolute;
        left: 0;
        right: 0;
        height: 12px;
        z-index: 1;
      }
      .strip-top {
        top: 0;
        background: linear-gradient(
          90deg,
          var(--red) 0%,
          var(--navy) 25%,
          var(--yellow) 50%,
          var(--pink) 75%,
          var(--electric) 100%
        );
        animation: stripSlide 3s linear infinite;
      }
      .strip-bottom {
        bottom: 0;
        background: linear-gradient(
          90deg,
          var(--electric) 0%,
          var(--pink) 25%,
          var(--yellow) 50%,
          var(--navy) 75%,
          var(--red) 100%
        );
        animation: stripSlide 3s linear infinite reverse;
      }
      @keyframes stripSlide {
        0% {
          background-position: 0% 0%;
        }
        100% {
          background-position: 100% 0%;
        }
      }

      .card-content {
        padding: 60px 50px;
        position: relative;
        z-index: 2;
        background: white;
      }

      .avatar-container {
        display: flex;
        justify-content: center;
        margin-bottom: 40px;
        position: relative;
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      .avatar-wrapper {
        position: relative;
        width: 180px;
        height: 180px;
      }

      /* ── THE ONLY CHANGE: using <img> tag instead of background-image ── */
      .avatar-glitch {
        position: absolute;
        inset: 0;
        border: 6px solid white;
        box-shadow:
          0 0 0 4px var(--navy),
          0 20px 40px rgba(0, 0, 0, 0.3);
        clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        overflow: hidden;
      }
      .avatar-glitch img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
        display: block;
      }
      .avatar-glitch-1 {
        animation: glitch1 2s infinite;
        opacity: 0.8;
      }
      .avatar-glitch-2 {
        animation: glitch2 2.5s infinite;
        opacity: 0.8;
        z-index: 1;
      }
      .avatar-main {
        position: relative;
        z-index: 2;
      }

      @keyframes glitch1 {
        0%,
        100% {
          transform: translate(0, 0);
          opacity: 0;
        }
        10% {
          transform: translate(-5px, -5px);
          opacity: 0.8;
          filter: hue-rotate(90deg);
        }
        20% {
          transform: translate(5px, 5px);
          opacity: 0;
        }
      }
      @keyframes glitch2 {
        0%,
        100% {
          transform: translate(0, 0);
          opacity: 0;
        }
        15% {
          transform: translate(5px, -5px);
          opacity: 0.8;
          filter: hue-rotate(-90deg);
        }
        25% {
          transform: translate(-5px, 5px);
          opacity: 0;
        }
      }

      .orbit-square {
        position: absolute;
        width: 30px;
        height: 30px;
        border: 4px solid;
        animation: orbitSpin 4s linear infinite;
      }
      .square-1 {
        border-color: var(--pink);
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        animation-delay: 0s;
      }
      .square-2 {
        border-color: var(--electric);
        bottom: -20px;
        left: 50%;
        transform: translateX(-50%);
        animation-delay: -2s;
      }
      .square-3 {
        border-color: var(--yellow);
        top: 50%;
        right: -20px;
        transform: translateY(-50%);
        animation-delay: -1s;
      }
      .square-4 {
        border-color: var(--red);
        top: 50%;
        left: -20px;
        transform: translateY(-50%);
        animation-delay: -3s;
      }
      @keyframes orbitSpin {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(0deg) scale(1);
        }
        50% {
          transform: translate(-50%, -50%) rotate(180deg) scale(1.3);
        }
      }

      .title {
        text-align: center;
        margin-bottom: 10px;
        animation: slideInLeft 0.8s cubic-bezier(0.23, 1, 0.32, 1) 0.3s
          backwards;
      }
      @keyframes slideInLeft {
        0% {
          opacity: 0;
          transform: translateX(-100px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .title h1 {
        font-family: "Bebas Neue", cursive;
        font-size: 56px;
        color: var(--navy);
        letter-spacing: 4px;
        position: relative;
        display: inline-block;
        text-transform: uppercase;
      }
      .title h1::before,
      .title h1::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      .title h1::before {
        color: var(--pink);
        animation: glitchText1 3s infinite;
        clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
      }
      .title h1::after {
        color: var(--electric);
        animation: glitchText2 3s infinite;
        clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
      }
      @keyframes glitchText1 {
        0%,
        100% {
          transform: translate(0, 0);
          opacity: 0;
        }
        2% {
          transform: translate(-3px, 0);
          opacity: 1;
        }
        4% {
          transform: translate(0, 0);
          opacity: 0;
        }
      }
      @keyframes glitchText2 {
        0%,
        100% {
          transform: translate(0, 0);
          opacity: 0;
        }
        2.5% {
          transform: translate(3px, 0);
          opacity: 1;
        }
        4.5% {
          transform: translate(0, 0);
          opacity: 0;
        }
      }

      .subtitle {
        text-align: center;
        color: #666;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 50px;
        animation: slideInRight 0.8s cubic-bezier(0.23, 1, 0.32, 1) 0.5s
          backwards;
      }
      @keyframes slideInRight {
        0% {
          opacity: 0;
          transform: translateX(100px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .badge-section {
        display: flex;
        justify-content: center;
        animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.7s backwards;
      }
      @keyframes popIn {
        0% {
          opacity: 0;
          transform: scale(0) rotate(-180deg);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
      }
      .verification-badge {
        display: inline-flex;
        align-items: center;
        gap: 15px;
        padding: 20px 40px;
        background: var(--navy);
        position: relative;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        border: 4px solid var(--pink);
        box-shadow: 8px 8px 0 var(--electric);
      }
      .verification-badge:hover {
        transform: translate(4px, 4px);
        box-shadow: 4px 4px 0 var(--electric);
      }
      .verification-badge::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 10px,
          rgba(255, 255, 255, 0.05) 10px,
          rgba(255, 255, 255, 0.05) 20px
        );
        animation: stripeScroll 20s linear infinite;
      }
      @keyframes stripeScroll {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(28px);
        }
      }
      .badge-icon {
        width: 32px;
        height: 32px;
        background: var(--yellow);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
        animation: iconBounce 1s ease-in-out infinite;
      }
      @keyframes iconBounce {
        0%,
        100% {
          transform: scale(1) rotate(0deg);
        }
        50% {
          transform: scale(1.2) rotate(10deg);
        }
      }
      .badge-icon svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: var(--navy);
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .badge-text {
        font-family: "Bebas Neue", cursive;
        font-size: 24px;
        color: white;
        letter-spacing: 3px;
        position: relative;
        z-index: 1;
        text-transform: uppercase;
      }

      .info-tags {
        display: flex;
        justify-content: space-between;
        margin-top: 50px;
        gap: 15px;
        animation: fadeInUp 0.8s ease 0.9s backwards;
      }
      @keyframes fadeInUp {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .info-tag {
        flex: 1;
        padding: 15px;
        background: var(--cream);
        border: 3px solid var(--navy);
        text-align: center;
        font-weight: 700;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        position: relative;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .info-tag::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          var(--yellow),
          transparent
        );
        transition: left 0.5s;
      }
      .info-tag:hover::before {
        left: 100%;
      }
      .info-tag:hover {
        transform: translateY(-5px);
        border-color: var(--pink);
      }
      .info-tag-label {
        display: block;
        font-size: 10px;
        color: #999;
        margin-bottom: 5px;
      }
      .info-tag-value {
        display: block;
        color: var(--navy);
        font-size: 14px;
      }

      @media (max-width: 560px) {
        .card {
          width: 95vw;
          max-width: 440px;
          box-shadow:
            15px 15px 0 var(--navy),
            15px 15px 0 2px var(--pink);
        }
        .card-content {
          padding: 50px 30px;
        }
        .title h1 {
          font-size: 42px;
        }
        .avatar-wrapper {
          width: 150px;
          height: 150px;
        }
        .info-tags {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="strip strip-top"></div>
        <div class="card-content">
          <div class="avatar-container">
            <div class="avatar-wrapper">
              <div class="orbit-square square-1"></div>
              <div class="orbit-square square-2"></div>
              <div class="orbit-square square-3"></div>
              <div class="orbit-square square-4"></div>

              <div class="avatar-glitch avatar-glitch-1">
                <img src="pfpj-c.png" alt="Javith" />
              </div>
              <div class="avatar-glitch avatar-glitch-2">
                <img src="pfpj-c.png" alt="Javith" />
              </div>
              <div class="avatar-glitch avatar-main">
                <img src="pfpj-c.png" alt="Javith" />
              </div>
            </div>
          </div>

          <div class="title">
            <h1 data-text="JAVITH'S ITEM">JAVITH'S ITEM</h1>
          </div>
          <div class="subtitle">This Item Belongs to Javith</div>

          <div class="badge-section">
            <div class="verification-badge">
              <div class="badge-icon">
                <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"></path></svg>
              </div>
              <span class="badge-text">Verified</span>
            </div>
          </div>

          <div class="info-tags">
            <div class="info-tag">
              <span class="info-tag-label">Status</span>
              <span class="info-tag-value">ACTIVE</span>
            </div>
            <div class="info-tag">
              <span class="info-tag-label">ID</span>
              <span class="info-tag-value">JV-2026</span>
            </div>
            <div class="info-tag">
              <span class="info-tag-label">Type</span>
              <span class="info-tag-value">AUTH</span>
            </div>
          </div>
        </div>
        <div class="strip strip-bottom"></div>
      </div>
    </div>
  </body>
</html>
